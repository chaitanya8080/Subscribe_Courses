# ============================================================================
#  pytest configuration for the Subscribe Courses E2E suite
# ============================================================================
[pytest]
# Where the tests live.
testpaths = tests

# Default options applied to every run:
#   -v                : verbose, one line per test
#   --alluredir=...   : always write Allure result files for the report
#   --browser chromium: run on Chromium by default (override with --browser firefox)
addopts = -v --alluredir=allure-results --browser chromium

# Agile test categorisation. Run a subset with:  pytest -m smoke
markers =
    smoke: fast, critical-path checks that must always pass (build gate)
    regression: broader functional checks
    auth: login / registration related
    navigation: routing / menu / drawer behaviour
